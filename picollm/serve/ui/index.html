<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>picoLLM chat</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fcfbf8;
        --bg-soft: #f6f4ef;
        --panel: rgba(255, 255, 255, 0.82);
        --panel-border: rgba(22, 22, 22, 0.08);
        --ink: #181818;
        --muted: #7a776f;
        --line: rgba(22, 22, 22, 0.08);
        --pill: #f1efe9;
        --accent: #181818;
        --shadow: 0 18px 60px rgba(19, 19, 19, 0.08);
        font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(0, 0, 0, 0.03), transparent 28%),
          linear-gradient(180deg, #fffefb 0%, var(--bg) 100%);
        color: var(--ink);
        overflow: hidden;
      }

      main {
        max-width: 1500px;
        margin: 0 auto;
        padding: 20px 22px 230px;
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 14px;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      h1 {
        margin: 0;
        font-size: 2.2rem;
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      .subhead {
        margin: 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .badge {
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.85);
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 0.83rem;
        color: var(--muted);
        backdrop-filter: blur(10px);
      }

      .columns {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
        min-height: 0;
      }

      .columns.single {
        grid-template-columns: minmax(0, 1fr);
        max-width: 1040px;
        margin: 0 auto;
      }

      .pane {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
        overflow: hidden;
        min-height: 0;
        backdrop-filter: blur(18px);
      }

      .columns.single .pane {
        background: transparent;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }

      .pane-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        padding: 14px 18px 10px;
        border-bottom: 1px solid rgba(22, 22, 22, 0.05);
        background: rgba(255, 255, 255, 0.58);
      }

      .columns.single .pane-head {
        padding: 8px 4px 18px;
        background: transparent;
        border-bottom: none;
      }

      .pane-title {
        min-width: 0;
      }

      .pane-title strong {
        display: block;
        font-size: 0.98rem;
        letter-spacing: -0.02em;
      }

      .pane-title span,
      .status {
        color: var(--muted);
        font-size: 0.82rem;
      }

      .pane-title span {
        display: block;
        margin-top: 2px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .transcript {
        padding: 22px 22px 30px;
        display: grid;
        gap: 26px;
        align-content: start;
        overflow-y: auto;
        min-height: 0;
      }

      .columns.single .transcript {
        padding: 6px 6px 30px;
      }

      .placeholder {
        margin: 18vh auto 0;
        max-width: 480px;
        text-align: center;
        color: var(--muted);
        line-height: 1.65;
      }

      .message-row {
        display: flex;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-row.assistant {
        justify-content: flex-start;
      }

      .bubble {
        max-width: min(760px, 88%);
        padding: 0;
        white-space: pre-wrap;
        line-height: 1.6;
        font-size: 1rem;
        letter-spacing: -0.01em;
      }

      .assistant {
        background: transparent;
        border: none;
        padding-right: 24px;
        font-size: 1.02rem;
      }

      .user {
        background: var(--pill);
        border: 1px solid rgba(22, 22, 22, 0.05);
        border-radius: 24px;
        padding: 18px 22px;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8) inset;
      }

      .composer-shell {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 18px 22px 22px;
        background: linear-gradient(180deg, rgba(252, 251, 248, 0) 0%, rgba(252, 251, 248, 0.9) 22%, rgba(252, 251, 248, 1) 100%);
        backdrop-filter: blur(14px);
      }

      .composer-wrap {
        max-width: 1120px;
        margin: 0 auto;
      }

      .pill-row {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 4px 2px 10px;
        margin: 0 0 8px;
        scrollbar-width: none;
      }

      .pill-row::-webkit-scrollbar {
        display: none;
      }

      .pill {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.95);
        color: #4a4a4a;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 0.84rem;
        cursor: pointer;
        transition: background 120ms ease, transform 120ms ease;
      }

      .pill:hover {
        background: #fff;
        transform: translateY(-1px);
      }

      .composer {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        padding: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }

      textarea {
        min-height: 84px;
        max-height: 220px;
        resize: vertical;
        border: 0;
        outline: none;
        padding: 14px 14px 12px;
        font: inherit;
        color: var(--ink);
        background: transparent;
        line-height: 1.55;
      }

      textarea::placeholder {
        color: #9a968f;
      }

      .send {
        align-self: end;
        width: 54px;
        height: 54px;
        border: 0;
        border-radius: 18px;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font-size: 1.1rem;
        box-shadow: 0 12px 24px rgba(24, 24, 24, 0.18);
      }

      .send:disabled {
        opacity: 0.65;
        cursor: progress;
      }

      .helper {
        margin: 10px 4px 0;
        color: var(--muted);
        font-size: 0.84rem;
      }

      @media (max-width: 960px) {
        main {
          padding-bottom: 270px;
        }

        body {
          overflow: auto;
        }

        .columns {
          grid-template-columns: 1fr;
        }

        .pane {
          min-height: 42vh;
          height: auto;
        }
      }

      @media (max-width: 640px) {
        h1 {
          font-size: 1.9rem;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .send {
          width: 100%;
          height: 52px;
        }

        .transcript,
        .columns.single .transcript {
          padding-left: 4px;
          padding-right: 4px;
        }

        .bubble {
          max-width: 94%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <div class="brand">
          <h1>picoLLM</h1>
          <p class="subhead" id="subhead">Loading model setup...</p>
        </div>
        <div class="badge" id="mode-badge">Preparing UI</div>
      </div>

      <div class="columns" id="columns"></div>
    </main>

    <div class="composer-shell">
      <div class="composer-wrap">
        <div class="pill-row" id="pill-row"></div>
        <form class="composer" id="form">
          <textarea id="prompt" placeholder="Ask something..."></textarea>
          <button class="send" type="submit" id="send" aria-label="Send">↵</button>
        </form>
        <div class="helper" id="helper">The same message is sent to both panes so you can compare them live.</div>
      </div>
    </div>

    <script>
      const form = document.getElementById("form");
      const prompt = document.getElementById("prompt");
      const send = document.getElementById("send");
      const columns = document.getElementById("columns");
      const subhead = document.getElementById("subhead");
      const modeBadge = document.getElementById("mode-badge");
      const helper = document.getElementById("helper");
      const pillRow = document.getElementById("pill-row");

      const suggestions = [
        "Explain tokenization for a first-year student.",
        "What is LoRA?",
        "Use one analogy to explain self-attention.",
        "Give me a two-step study plan for learning transformers.",
      ];

      const systemMessage = { role: "system", content: "You are a helpful assistant." };
      const chats = {};
      let compareMode = false;

      function createSuggestions() {
        suggestions.forEach((text) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "pill";
          button.textContent = text;
          button.addEventListener("click", () => {
            prompt.value = text;
            prompt.focus();
          });
          pillRow.appendChild(button);
        });
      }

      function createPane(id, title, subtitle) {
        const wrapper = document.createElement("section");
        wrapper.className = "pane";
        wrapper.innerHTML = `
          <div class="pane-head">
            <div class="pane-title">
              <strong>${title}</strong>
              <span>${subtitle}</span>
            </div>
            <div class="status" id="${id}-status">Ready</div>
          </div>
          <div class="transcript" id="${id}-transcript">
            <div class="placeholder" id="${id}-placeholder">Start with a prompt below. This pane will stream the reply live.</div>
          </div>
        `;
        columns.appendChild(wrapper);
        chats[id] = {
          transcript: wrapper.querySelector(`#${id}-transcript`),
          status: wrapper.querySelector(`#${id}-status`),
          placeholder: wrapper.querySelector(`#${id}-placeholder`),
          messages: [systemMessage],
        };
      }

      function removePlaceholder(chat) {
        if (chat.placeholder) {
          chat.placeholder.remove();
          chat.placeholder = null;
        }
      }

      function addBubble(chat, role, content) {
        removePlaceholder(chat);
        const row = document.createElement("div");
        row.className = `message-row ${role}`;
        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.textContent = content;
        row.appendChild(bubble);
        chat.transcript.appendChild(row);
        chat.transcript.scrollTop = chat.transcript.scrollHeight;
        return bubble;
      }

      async function postStream(path, payload, onToken) {
        const response = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || `Request failed with ${response.status}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop() || "";

          for (const part of parts) {
            if (!part.startsWith("data: ")) continue;
            const data = part.slice(6);
            if (data === "[DONE]") return;
            const payload = JSON.parse(data);
            if (payload.token) onToken(payload.token);
          }
        }
      }

      async function runChat(id, path, content) {
        const chat = chats[id];
        chat.messages.push({ role: "user", content });
        addBubble(chat, "user", content);
        const assistantBubble = addBubble(chat, "assistant", "");
        chat.status.textContent = "Generating...";

        try {
          await postStream(
            path,
            { messages: chat.messages, temperature: 0.7, max_new_tokens: 256 },
            (token) => {
              assistantBubble.textContent += token;
              chat.transcript.scrollTop = chat.transcript.scrollHeight;
            },
          );
          const reply = assistantBubble.textContent.trim() || "(No response)";
          assistantBubble.textContent = reply;
          chat.messages.push({ role: "assistant", content: reply });
          chat.status.textContent = "Ready";
        } catch (error) {
          assistantBubble.textContent = `Error: ${error.message}`;
          chat.status.textContent = "Error";
        }
      }

      async function init() {
        createSuggestions();

        const response = await fetch("/ui-config");
        const config = await response.json();

        compareMode = Boolean(config.compare_available);
        columns.classList.toggle("single", !compareMode);
        createPane("base", compareMode ? "Base model" : "Chat", config.base_label);

        if (compareMode) {
          createPane("adapter", "LoRA adapter", config.adapter_label);
          subhead.textContent = "Compare mode";
          modeBadge.textContent = "Two responses";
          helper.textContent = "The same message is sent to both panes so you can compare the baseline and LoRA behavior live.";
          prompt.placeholder = "Ask one question and send it to both models...";
        } else {
          subhead.textContent = "Single model";
          modeBadge.textContent = "One response";
          helper.textContent = "Start the server with --adapter to unlock side-by-side comparison.";
          prompt.placeholder = "Ask something...";
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const content = prompt.value.trim();
        if (!content) return;

        send.disabled = true;
        prompt.value = "";

        const jobs = [runChat("base", "/chat/base/stream", content)];
        if (compareMode) {
          jobs.push(runChat("adapter", "/chat/adapter/stream", content));
        }

        await Promise.all(jobs);
        send.disabled = false;
        prompt.focus();
      });

      prompt.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          form.requestSubmit();
        }
      });

      init().catch((error) => {
        subhead.textContent = `Load error`;
        modeBadge.textContent = "Unavailable";
        helper.textContent = `Failed to load UI config: ${error.message}`;
      });
    </script>
  </body>
</html>
