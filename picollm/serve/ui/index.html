<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>picoLLM chat</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
        --bg: #f6f2eb;
        --panel: #fffdf8;
        --ink: #1d1a16;
        --accent: #8e4b2c;
      }
      body { margin: 0; background: radial-gradient(circle at top, #fffaf0, var(--bg)); color: var(--ink); }
      main { max-width: 920px; margin: 0 auto; padding: 32px 18px 80px; }
      h1 { font-weight: 600; }
      #chat { display: grid; gap: 16px; margin: 28px 0; }
      .bubble { padding: 16px 18px; border-radius: 18px; background: var(--panel); box-shadow: 0 10px 30px rgba(0,0,0,.05); }
      .user { margin-left: auto; max-width: 60%; background: #efe7dd; }
      .assistant { max-width: 80%; }
      form { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
      textarea { min-height: 90px; resize: vertical; padding: 14px; border-radius: 14px; border: 1px solid #d8cbbd; font: inherit; }
      button { border: 0; border-radius: 14px; padding: 0 20px; font: inherit; background: var(--accent); color: white; cursor: pointer; }
    </style>
  </head>
  <body>
    <main>
      <h1>picoLLM</h1>
      <div id="chat"></div>
      <form id="form">
        <textarea id="prompt" placeholder="Ask something..."></textarea>
        <button type="submit">Send</button>
      </form>
    </main>
    <script>
      const chat = document.getElementById("chat");
      const form = document.getElementById("form");
      const prompt = document.getElementById("prompt");
      const messages = [{ role: "system", content: "You are a helpful assistant." }];

      function addBubble(role, content) {
        const div = document.createElement("div");
        div.className = `bubble ${role}`;
        div.textContent = content;
        chat.appendChild(div);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const content = prompt.value.trim();
        if (!content) return;
        messages.push({ role: "user", content });
        addBubble("user", content);
        prompt.value = "";
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages, temperature: 0.7, max_new_tokens: 256 }),
        });
        const payload = await response.json();
        messages.push({ role: "assistant", content: payload.reply });
        addBubble("assistant", payload.reply);
      });
    </script>
  </body>
</html>
